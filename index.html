<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LL(1) 预测分析表构造演示</title>
  <link rel="stylesheet" href="css/output.css" />
</head>
<body class="min-h-screen bg-base-200">

  <nav class="navbar bg-base-100 shadow-lg sticky top-0 z-50">
    <div class="flex-1">
      <span class="text-xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
        CompilerGUI
      </span>
      <span class="ml-2 badge badge-primary badge-outline">LL(1)</span>
    </div>
    <div class="flex-none gap-2">
      <label class="swap swap-rotate btn btn-ghost btn-circle">
        <input type="checkbox" id="themeToggle" />
        <svg class="swap-on fill-current w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
        <svg class="swap-off fill-current w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z"/></svg>
      </label>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-6 max-w-7xl">

    <div class="hero bg-gradient-to-r from-primary/10 to-secondary/10 rounded-2xl mb-6 p-6">
      <div class="hero-content text-center">
        <div class="max-w-lg">
          <h1 class="text-3xl font-bold">LL(1) 预测分析表构造演示</h1>
          <p class="py-4 text-base-content/70">
            输入文法，逐步演示 FIRST 集、FOLLOW 集的计算过程，构造 LL(1) 预测分析表，并可视化预测分析过程。
          </p>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

      <div class="lg:col-span-4 space-y-6">

        <div class="card bg-base-100 shadow-xl">
          <div class="card-body">
            <h2 class="card-title text-lg">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
              文法输入
            </h2>
            <div class="form-control">
              <label class="label">
                <span class="label-text font-medium">产生式规则</span>
              </label>
              <textarea id="grammarInput" class="textarea textarea-bordered h-48 font-mono text-sm" placeholder="每行一条产生式，例如：&#10;E -> T E'&#10;E' -> + T E' | ε&#10;T -> F T'&#10;T' -> * F T' | ε&#10;F -> ( E ) | id">E -> T E'
E' -> + T E' | ε
T -> F T'
T' -> * F T' | ε
F -> ( E ) | id</textarea>
              <label class="label">
                <span class="label-text-alt text-base-content/50">使用 | 分隔同一左部的多个候选式，ε 表示空串</span>
              </label>
            </div>
            <div class="card-actions justify-end mt-2">
              <button id="btnExample" class="btn btn-ghost btn-sm">示例文法</button>
              <button id="btnClear" class="btn btn-ghost btn-sm">清空</button>
              <button id="btnAnalyze" class="btn btn-primary">开始分析</button>
            </div>
          </div>
        </div>

        <div class="card bg-base-100 shadow-xl">
          <div class="card-body">
            <h2 class="card-title text-lg">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-secondary" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
              步骤控制
            </h2>
            <div class="flex flex-wrap gap-2 justify-center">
              <button id="btnFirst" class="btn btn-outline btn-sm" disabled>1. FIRST 集</button>
              <button id="btnFollow" class="btn btn-outline btn-sm" disabled>2. FOLLOW 集</button>
              <button id="btnTable" class="btn btn-outline btn-sm" disabled>3. 分析表</button>
              <button id="btnAll" class="btn btn-outline btn-sm btn-primary" disabled>全部展开</button>
            </div>
            <div class="divider text-xs">预测分析模拟</div>
            <div class="form-control">
              <label class="label">
                <span class="label-text font-medium">输入串</span>
              </label>
              <input id="inputString" type="text" class="input input-bordered input-sm font-mono" placeholder="例如: id + id * id" disabled />
            </div>
            <div class="flex gap-2 mt-2">
              <button id="btnParse" class="btn btn-secondary btn-sm flex-1" disabled>开始分析</button>
              <button id="btnParseReset" class="btn btn-ghost btn-sm" disabled>重置</button>
            </div>
          </div>
        </div>

      </div>

      <div class="lg:col-span-8 space-y-6">

        <div id="sectionGrammar" class="card bg-base-100 shadow-xl collapse collapse-arrow">
          <div class="collapse-title text-lg font-medium flex items-center gap-2 cursor-pointer">
            <span class="badge badge-primary">0</span>
            文法展示
          </div>
          <div class="collapse-content">
            <div id="grammarDisplay" class="overflow-x-auto"></div>
          </div>
        </div>

        <div id="sectionFirst" class="card bg-base-100 shadow-xl collapse collapse-arrow">
          <div class="collapse-title text-lg font-medium flex items-center gap-2 cursor-pointer">
            <span class="badge badge-secondary">1</span>
            FIRST 集计算
          </div>
          <div class="collapse-content">
            <div id="firstSteps" class="space-y-3"></div>
            <div class="divider">最终结果</div>
            <div id="firstResult" class="overflow-x-auto"></div>
          </div>
        </div>

        <div id="sectionFollow" class="card bg-base-100 shadow-xl collapse collapse-arrow">
          <div class="collapse-title text-lg font-medium flex items-center gap-2 cursor-pointer">
            <span class="badge badge-accent">2</span>
            FOLLOW 集计算
          </div>
          <div class="collapse-content">
            <div id="followSteps" class="space-y-3"></div>
            <div class="divider">最终结果</div>
            <div id="followResult" class="overflow-x-auto"></div>
          </div>
        </div>

        <div id="sectionTable" class="card bg-base-100 shadow-xl collapse collapse-arrow">
          <div class="collapse-title text-lg font-medium flex items-center gap-2 cursor-pointer">
            <span class="badge badge-info">3</span>
            LL(1) 预测分析表
          </div>
          <div class="collapse-content">
            <div id="tableResult" class="overflow-x-auto"></div>
            <div id="tableConflict" class="mt-3"></div>
          </div>
        </div>

        <div id="sectionParse" class="card bg-base-100 shadow-xl collapse collapse-arrow">
          <div class="collapse-title text-lg font-medium flex items-center gap-2 cursor-pointer">
            <span class="badge badge-success">4</span>
            预测分析过程
          </div>
          <div class="collapse-content">
            <div class="flex flex-wrap gap-2 mb-4 items-center justify-between">
              <div class="flex gap-2 items-center">
                <button id="btnPrevStep" class="btn btn-sm btn-outline" disabled>
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                  上一步
                </button>
                <span id="stepIndicator" class="text-sm font-mono text-base-content/70">步骤: 0 / 0</span>
                <button id="btnNextStep" class="btn btn-sm btn-outline" disabled>
                  下一步
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
                </button>
              </div>
              <div class="flex gap-2">
                <button id="btnAutoPlay" class="btn btn-sm btn-accent" disabled>自动播放</button>
              </div>
            </div>
            <div class="grid grid-cols-1 gap-4">
              <div>
                <h3 class="font-semibold mb-2">分析步骤</h3>
                <div id="parseSteps" class="overflow-x-auto max-h-64"></div>
              </div>
              <div>
                <h3 class="font-semibold mb-2">语法树</h3>
                <div id="parseTree" class="border border-base-300 rounded-lg"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer footer-center p-4 bg-base-100 text-base-content/50 mt-8">
    <div>
      <p>CompilerGUI - 编译原理可视化演示工具</p>
    </div>
  </footer>

  <div id="toastContainer" class="toast toast-end z-50"></div>

  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="js/grammar.js"></script>
  <script src="js/first-follow.js"></script>
  <script src="js/parsing-table.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
